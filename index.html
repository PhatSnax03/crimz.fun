<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Crimz Arcade</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>

<body>

  <!-- AUDIO -->
  <audio id="bg-music" loop>
    <source src="./slimeyfox-arcade-games-score-storm-480856.mp3" type="audio/mpeg" />
  </audio>

  <!-- HEADER -->
  <header class="arcade-header">
    <h1 class="neon-flicker">CRIMZ ARCADE</h1>
    <button id="music-toggle" class="music-btn" aria-label="Toggle music">🔇</button>
  </header>

  <!-- GAMES -->
  <main class="game-grid">
    <a href="Memory.html" class="game-card">
      <img src="memory-thumb.png" alt="Memory Match preview" />
      <span>Memory Match</span>
    </a>

    <a href="connect4.html" class="game-card">
      <img src="connect4-thumb.png" alt="Connect 4 preview" />
      <span>Connect 4</span>
    </a>

    <a href="tictactoe.html" class="game-card">
      <img src="tictactoe-thumb.png" alt="Tic Tac Toe preview" />
      <span>Tic Tac Toe</span>
    </a>
  </main>

  <!-- FOOTER -->
  <footer class="footer">© 2025 Crimz Arcade</footer>

</body>
</html>
