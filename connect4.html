<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Connect 4 | Crimz Arcade</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <div class="page-glow page-glow-left"></div>
  <div class="page-glow page-glow-right"></div>
  <div class="page-noise"></div>

  <audio id="bg-music" loop autoplay>
    <source src="assets/music/connect4.mp3" type="audio/mpeg" />
  </audio>

  <main class="game-shell">
    <header class="game-topbar">
      <a class="back-link" href="index.html">← Back to Arcade</a>
      <button id="music-toggle" class="music-btn" aria-label="Toggle music">🔊</button>
    </header>

    <section class="game-stage">
      <div class="game-stage-copy">
        <p class="game-kicker">Versus</p>
        <h1 class="game-stage-title">CONNECT 4</h1>
        <p class="game-stage-subtitle">
          Stack your moves, block the lane, and land four before your opponent does.
        </p>
      </div>
    </section>

    <section class="c4-layout">
      <aside class="c4-sidebar">
        <div class="game-panel">
          <p class="panel-label">Now playing</p>
          <h2 class="panel-title">Connect 4</h2>
          <p class="panel-text">
            A clean head-to-head round for two players.
          </p>
        </div>

        <div class="c4-status-grid">
          <div class="pill">
            <strong>Turn</strong>
            <span id="c4-turn">Player 1 (🟠)</span>
          </div>

          <div class="pill">
            <strong>Status</strong>
            <span id="c4-winner">—</span>
          </div>
        </div>

        <div class="c4-actions">
          <button id="c4-reset" class="btn" type="button">↻ Play Again</button>
          <a class="btn ghost" href="index.html">Exit</a>
        </div>
      </aside>

      <section class="c4-board-wrap" aria-label="Connect Four game area">
        <div class="c4-board-frame">
          <section id="c4-board" class="c4-board" aria-label="Connect Four board"></section>
        </div>
      </section>
    </section>
  </main>

  <canvas id="confetti" class="confetti"></canvas>

  <script>
    function launchConfetti() {
      const canvas = document.getElementById('confetti');
      const ctx = canvas.getContext('2d');
      const pieces = [];
      const colors = ['#FAB12F', '#1E90FF', '#FF3E3E', '#4FC3F7'];
      const w = canvas.width = window.innerWidth;
      const h = canvas.height = window.innerHeight;

      for (let i = 0; i < 120; i++) {
        pieces.push({
          x: Math.random() * w,
          y: Math.random() * h - h,
          size: 6 + Math.random() * 6,
          color: colors[Math.floor(Math.random() * colors.length)],
          speed: 3 + Math.random() * 3,
          rotation: Math.random() * 360,
        });
      }

      let frame = 0;

      const draw = () => {
        frame++;
        ctx.clearRect(0, 0, w, h);

        pieces.forEach((p) => {
          p.y += p.speed;
          p.x += Math.sin(p.rotation) * 2;
          p.rotation += 0.05;

          if (p.y > h) p.y = -10;

          ctx.fillStyle = p.color;
          ctx.fillRect(p.x, p.y, p.size, p.size);
        });

        if (frame < 100) {
          requestAnimationFrame(draw);
        } else {
          ctx.clearRect(0, 0, w, h);
        }
      };

      draw();
    }

    const C4_ROWS = 6;
    const C4_COLS = 7;

    let c4 = Array.from({ length: C4_ROWS }, () => Array(C4_COLS).fill(null));
    let cPlayer = 'orange';
    let cOver = false;

    const cBoard = document.getElementById('c4-board');
    const cTurn = document.getElementById('c4-turn');
    const cWin = document.getElementById('c4-winner');
    const cReset = document.getElementById('c4-reset');

    function c4Render() {
      cBoard.innerHTML = '';

      for (let r = 0; r < C4_ROWS; r++) {
        for (let c = 0; c < C4_COLS; c++) {
          const cell = document.createElement('div');
          cell.className = 'c4-cell';

          if (c4[r][c]) {
            const disc = document.createElement('div');
            disc.className = 'c4-disc ' + c4[r][c];
            cell.appendChild(disc);
          }

          cell.addEventListener('click', () => c4Drop(c));
          cBoard.appendChild(cell);
        }
      }
    }

    function c4Drop(col) {
      if (cOver) return;

      for (let r = C4_ROWS - 1; r >= 0; r--) {
        if (!c4[r][col]) {
          c4[r][col] = cPlayer;
          c4Render();

          if (c4Win(r, col)) {
            cWin.textContent = `🎉 ${cPlayer === 'orange' ? 'Player 1 (🟠)' : 'Player 2 (🔵)'} wins!`;
            cTurn.textContent = '—';
            launchConfetti();
            cOver = true;
            return;
          }

          cPlayer = cPlayer === 'orange' ? 'blue' : 'orange';
          cTurn.textContent = cPlayer === 'orange' ? 'Player 1 (🟠)' : 'Player 2 (🔵)';
          return;
        }
      }
    }

    function c4Count(r, c, dr, dc) {
      let count = 0;

      for (let i = 1; i < 4; i++) {
        const nr = r + dr * i;
        const nc = c + dc * i;

        if (nr < 0 || nr >= C4_ROWS || nc < 0 || nc >= C4_COLS) break;
        if (c4[nr][nc] === cPlayer) count++;
        else break;
      }

      return count;
    }

    function c4Win(r, c) {
      const dirs = [[1, 0], [0, 1], [1, 1], [1, -1]];

      for (const [dr, dc] of dirs) {
        const count = 1 + c4Count(r, c, dr, dc) + c4Count(r, c, -dr, -dc);
        if (count >= 4) return true;
      }

      return false;
    }

    function c4Reset() {
      c4 = Array.from({ length: C4_ROWS }, () => Array(C4_COLS).fill(null));
      cPlayer = 'orange';
      cOver = false;
      cWin.textContent = '—';
      cTurn.textContent = 'Player 1 (🟠)';
      c4Render();
    }

    cReset.addEventListener('click', c4Reset);
    c4Render();
  </script>
</body>
</html>
